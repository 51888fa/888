<script>

// ===== DATA LAYER =====
function getData() {
    try { if (window._BAKED_DATA) return window._BAKED_DATA; } catch(e) {}
    try {
        const raw = localStorage.getItem('playzone_data');
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveData(data) {
    localStorage.setItem('playzone_data', JSON.stringify(data));
}
let DB = getData();

// ===== HELPERS =====
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n+'';

function getTagClass(g) {
    if (g.isNew) return 'new';
    if (g.isHot) return 'hot';
    if (g.isTop) return 'top';
    return '';
}
function getTagHtml(g) {
    if (g.isNew) return '<span class="gc-tag gc-tag-new">New</span>';
    if (g.isHot) return '<span class="gc-tag gc-tag-hot">Hot</span>';
    if (g.isTop) return '<span class="gc-tag gc-tag-top">Top</span>';
    return '';
}
function getHeroTagHtml(g) {
    const cls = g.isNew ? 'hc-tag-new' : g.isHot ? 'hc-tag-hot' : g.isTop ? 'hc-tag-top' : '';
    const txt = g.isNew ? 'NEW' : g.isHot ? 'HOT' : g.isTop ? 'TOP' : '';
    return txt ? `<span class="hc-tag ${cls}">${txt}</span>` : '';
}
function getFeatTagHtml(g) {
    if (g.isNew) return '<span class="f-tag-new">New</span>';
    if (g.isHot) return '<span class="f-tag-hot">Hot</span>';
    if (g.isTop) return '<span class="f-tag-top">Top</span>';
    return '';
}

// ===== RENDER FUNCTIONS =====
function renderHeroBar() {
    const el = document.getElementById('heroScrollGames');
    const games = DB.games.filter(g => g.hero);
    if (!games.length) { el.innerHTML = '<div class="empty-state"><p>No hero games set. Edit in admin panel.</p></div>'; return; }
    el.innerHTML = games.map(g => `
        <div class="hero-card" onclick="openPlayer('${g.gdId || ''}','${g.title.replace(/'/g,"\\'")}')">
            <div class="hero-card-img-wrap">
                <img src="${g.thumbnail}" alt="${g.title}"
                     onerror="this.onerror=null;this.src='https://placehold.co/320x200/13072a/a855f7?text=${encodeURIComponent(g.title)}'">
                <span class="hero-play-badge">▶ PLAY</span>
                <div class="hero-card-overlay"><span class="hero-card-play-btn">Play Now</span></div>
            </div>
            <div class="hero-card-body">
                <div class="hero-card-title">${g.title}</div>
                <div class="hero-card-meta">
                    ${getHeroTagHtml(g)}
                    <span class="hc-free">Free</span>
                </div>
            </div>
        </div>`).join('');
}

function renderFeatured() {
    const el = document.getElementById('featuredGames');
    const games = DB.games.filter(g => g.featured);
    if (!games.length) { el.innerHTML = '<div class="empty-state"><p>No featured games. Edit in admin panel.</p></div>'; return; }
    el.innerHTML = games.map(g => `
        <div class="feat-card" onclick="openPlayer('${g.gdId || ''}','${g.title.replace(/'/g,"\\'")}')">
            <div class="feat-card-img-wrap">
                <img src="${g.thumbnail}" alt="${g.title}"
                     onerror="this.onerror=null;this.src='https://placehold.co/420x280/13072a/a855f7?text=${encodeURIComponent(g.title)}'">
                <span class="feat-corner-badge">▶ Playable</span>
                <div class="feat-play-overlay"><span class="feat-play-btn">Play Now</span></div>
            </div>
            <div class="feat-card-body">
                <div class="feat-card-title">${g.title}</div>
                <div class="feat-card-meta">
                    ${getFeatTagHtml(g)}
                    <span class="f-plays">${fmt(g.plays)} plays</span>
                    <span class="f-free">Free</span>
                </div>
            </div>
        </div>`).join('');
}

function renderGameScroll(id, filterFn) {
    const el = document.getElementById(id);
    const games = DB.games.filter(filterFn).slice(0, 12);
    if (!games.length) { el.innerHTML = '<div class="empty-state" style="min-width:200px"><p>No games</p></div>'; return; }
    el.innerHTML = games.map(g => `
        <div class="game-card" data-id="${g.id}">
            <img class="game-card-img" src="${g.thumbnail}" alt="${g.title}"
                 onerror="this.src='https://placehold.co/350x263/21262d/7c3aed?text=${encodeURIComponent(g.title)}'">
            <div class="game-card-info">
                <div class="game-card-title">${g.title}</div>
                <div class="game-card-meta">${getTagHtml(g)}<span>${fmt(g.plays)} plays</span></div>
            </div>
        </div>`).join('');
}

function renderCategories() {
    const el = document.getElementById('categoryGrid');
    el.innerHTML = DB.categories.map(c => `
        <a href="#" class="category-card">
            <div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
            <div class="cat-info">
                <h4>${c.name}</h4>
                <span>${c.count.toLocaleString()} games</span>
            </div>
        </a>`).join('');
}

function applySiteSettings() {
    document.getElementById('siteLogo').textContent = DB.siteName;
    document.getElementById('footerLogo').textContent = DB.siteName;
    document.getElementById('siteBadge').textContent = DB.siteBadge;
    document.getElementById('featuredDesc').textContent = DB.siteDesc;
    document.getElementById('footerDesc').textContent = DB.siteDesc;
    document.title = DB.siteName + ' - Free Online Games';
}

// ===== PLAYER =====
function openPlayer(gdId, title) {
    if (!gdId) { alert('This game has no playable link yet. Edit in admin panel.'); return; }
    const modal = document.getElementById('playerModal');
    const iframe = document.getElementById('playerIframe');
    document.getElementById('playerTitle').textContent = title || 'Game';
    const ref = encodeURIComponent(window.location.origin + window.location.pathname);
    iframe.src = `https://html5.gamedistribution.com/${gdId}/?gd_sdk_referrer_url=${ref}`;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closePlayer() {
    document.getElementById('playerModal').classList.remove('active');
    document.getElementById('playerIframe').src = '';
    document.body.style.overflow = '';
}

// ===== GAME MODAL =====
function openGameModal(id) {
    const g = DB.games.find(x => x.id === id);
    if (!g) return;
    document.getElementById('modalImg').src = g.thumbnail;
    document.getElementById('modalTitle').textContent = g.title;
    document.getElementById('modalCat').textContent = `🎮 ${g.category}`;
    document.getElementById('modalPlays').textContent = fmt(g.plays);
    document.getElementById('modalDesc').textContent = g.description;
    document.getElementById('modalPlayBtn').dataset.id = id;
    document.getElementById('modalLikeBtn').dataset.id = id;
    const liked = JSON.parse(localStorage.getItem('playzone_liked') || '[]');
    document.getElementById('modalLikeBtn').textContent = liked.includes(id) ? '❤️ Liked' : '🤍 Like';
    document.getElementById('gameModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeGameModal() {
    document.getElementById('gameModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ===== SEARCH =====
function openSearch() { document.getElementById('searchModal').classList.add('active'); document.getElementById('searchInput').focus(); }
function closeSearch() { document.getElementById('searchModal').classList.remove('active'); document.getElementById('searchInput').value = ''; document.getElementById('searchResults').innerHTML = ''; }
function handleSearch(e) {
    const q = e.target.value.toLowerCase().trim();
    const res = document.getElementById('searchResults');
    if (q.length < 2) { res.innerHTML = ''; return; }
    const hits = DB.games.filter(g => g.title.toLowerCase().includes(q) || g.category.toLowerCase().includes(q)).slice(0, 8);
    res.innerHTML = hits.length
        ? hits.map(g => `
            <div class="game-card" data-id="${g.id}" style="min-width:175px">
                <img class="game-card-img" src="${g.thumbnail}" alt="${g.title}"
                     onerror="this.src='https://placehold.co/350x263/21262d/7c3aed?text=${encodeURIComponent(g.title)}'">
                <div class="game-card-info">
                    <div class="game-card-title">${g.title}</div>
                    <div class="game-card-meta">${getTagHtml(g)}<span>${fmt(g.plays)} plays</span></div>
                </div>
            </div>`).join('')
        : '<p style="color:var(--text2);padding:30px;font-size:14px;">No games found</p>';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    applySiteSettings();
    renderHeroBar();
    renderFeatured();
    renderGameScroll('newGames', g => g.isNew);
    renderGameScroll('trendingGames', g => g.isHot);
    renderGameScroll('editorPicks', g => g.isTop);
    renderGameScroll('mostPlayed', g => true);
    renderGameScroll('mayLike', g => true);
    renderCategories();

    // Events
    document.getElementById('searchBtn').onclick = openSearch;
    document.getElementById('searchClose').onclick = closeSearch;
    document.getElementById('searchInput').addEventListener('input', handleSearch);
    document.getElementById('searchModal').addEventListener('click', e => { if (e.target.id === 'searchModal') closeSearch(); });
    document.getElementById('playerClose').onclick = closePlayer;
    document.getElementById('modalClose').onclick = closeGameModal;
    document.getElementById('gameModal').addEventListener('click', e => { if (e.target.id === 'gameModal') closeGameModal(); });

    document.addEventListener('click', e => {
        const card = e.target.closest('.game-card');
        if (card && card.dataset.id) openGameModal(parseInt(card.dataset.id));
    });

    document.getElementById('modalPlayBtn').onclick = function() {
        const g = DB.games.find(x => x.id === parseInt(this.dataset.id));
        if (g) { closeGameModal(); openPlayer(g.gdId, g.title); }
    };
    document.getElementById('modalLikeBtn').onclick = function() {
        const id = parseInt(this.dataset.id);
        let liked = JSON.parse(localStorage.getItem('playzone_liked') || '[]');
        if (liked.includes(id)) { liked = liked.filter(x => x !== id); this.textContent = '🤍 Like'; }
        else { liked.push(id); this.textContent = '❤️ Liked'; }
        localStorage.setItem('playzone_liked', JSON.stringify(liked));
    };

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeSearch(); closeGameModal(); closePlayer(); }
        if (e.key === '/' && !e.target.matches('input,textarea')) { e.preventDefault(); openSearch(); }
    });
});
    // Inject ads from admin panel
    (function(){
        try {
